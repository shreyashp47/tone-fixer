<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tone Fixer</title>
  <link rel="stylesheet" href="popup.css" />
  <link rel="icon" type="image/png" href="icons/icon16.png" />
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <svg width="20" height="20" viewBox="0 0 340 340" style="border-radius:5px">
          <defs>
            <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#6366f1"/>
              <stop offset="100%" stop-color="#8b5cf6"/>
            </linearGradient>
          </defs>
          <rect x="20" y="20" width="300" height="300" rx="64" fill="url(#bgGrad)"/>
          <path d="M 80 120 h 180 a 20 20 0 0 1 20 20 v 90 a 20 20 0 0 1 -20 20 h -110 l -40 35 v -35 h -30 a 20 20 0 0 1 -20 -20 v -90 a 20 20 0 0 1 20 -20 z" fill="#fff"/>
          <path d="M 130 185 l 22 22 l 45 -50" fill="none" stroke="#6366f1" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <h1 class="title">Tone <span>Fixer</span></h1>
      </div>
      <div class="header-right">
        <span class="provider-badge" id="providerLabel"></span>
        <button id="settingsLink" class="settings-btn" title="Settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </div>

    <div id="missingKeyNotice" class="notice hidden">
      <strong>👋 Welcome to Tone Fixer!</strong><br />
      You need an API key to use this extension.
      <a href="#" id="openOptionsLink">Open Settings</a> to add one —
      Groq offers a <strong>free</strong> tier, no credit card needed.
    </div>

    <div id="mainContent">
      <label for="inputText" class="label">Your text</label>
      <textarea id="inputText" class="textarea" placeholder="Paste your text here..."></textarea>

      <label class="label">Tone</label>
      <div class="tone-group" id="toneGroup">
        <button class="tone-btn" data-tone="polite">Polite</button>
        <button class="tone-btn" data-tone="casual">Casual</button>
        <button class="tone-btn" data-tone="formal">Formal</button>
      </div>

      <label class="label">Send to</label>
      <div class="target-group" id="targetGroup">
        <button class="target-btn active" data-target="teams">Teams / Chat</button>
        <button class="target-btn" data-target="email">Email</button>
      </div>

      <label for="instruction" class="label">Instructions (optional)</label>
      <input type="text" id="instruction" class="text-input" placeholder="e.g. Make it sound more professional..." />

      <button id="generateBtn" class="btn btn-primary">Generate</button>

      <div id="errorMsg" class="error-msg hidden"></div>

      <div id="loadingSpinner" class="spinner hidden">Rewriting…</div>

      <div class="label-row">
        <label for="outputText" class="label">Result</label>
        <span id="outputStats" class="output-stats"></span>
      </div>
      <textarea id="outputText" class="textarea textarea-result" readonly placeholder="Rewritten text will appear here..."></textarea>

      <button id="copyBtn" class="btn btn-secondary">Copy to Clipboard</button>
    </div>
  </div>

  <script src="providers.js"></script>
  <script src="popup.js"></script>
</body>
</html>
