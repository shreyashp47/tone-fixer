<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tone Fixer</title>
  <link rel="stylesheet" href="popup.css" />
  <link rel="icon" type="image/png" href="icons/icon16.png" />
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <svg width="20" height="20" viewBox="0 0 340 340" style="border-radius:5px">
          <defs>
            <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#6366f1"/>
              <stop offset="100%" stop-color="#8b5cf6"/>
            </linearGradient>
          </defs>
          <rect x="20" y="20" width="300" height="300" rx="64" fill="url(#bgGrad)"/>
          <path d="M 80 120 h 180 a 20 20 0 0 1 20 20 v 90 a 20 20 0 0 1 -20 20 h -110 l -40 35 v -35 h -30 a 20 20 0 0 1 -20 -20 v -90 a 20 20 0 0 1 20 -20 z" fill="#fff"/>
          <path d="M 130 185 l 22 22 l 45 -50" fill="none" stroke="#6366f1" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <h1 class="title">Tone <span>Fixer</span></h1>
      </div>
      <span class="provider-badge" id="providerLabel"></span>
    </div>

    <div id="missingKeyNotice" class="notice hidden">
      No API key set.
      <a href="#" id="openOptionsLink">Open settings</a> to add one.
    </div>

    <div id="mainContent">
      <label for="inputText" class="label">Your text</label>
      <textarea id="inputText" class="textarea" placeholder="Paste your text here..."></textarea>

      <label class="label">Tone</label>
      <div class="tone-group" id="toneGroup">
        <button class="tone-btn" data-tone="polite">Polite</button>
        <button class="tone-btn" data-tone="casual">Casual</button>
        <button class="tone-btn" data-tone="formal">Formal</button>
      </div>

      <label class="label">Send to</label>
      <div class="target-group" id="targetGroup">
        <button class="target-btn active" data-target="teams">Teams / Chat</button>
        <button class="target-btn" data-target="email">Email</button>
      </div>

      <button id="generateBtn" class="btn btn-primary">Generate</button>

      <div id="errorMsg" class="error-msg hidden"></div>

      <div id="loadingSpinner" class="spinner hidden">Rewriting…</div>

      <div class="label-row">
        <label for="outputText" class="label">Result</label>
        <span id="outputStats" class="output-stats"></span>
      </div>
      <textarea id="outputText" class="textarea textarea-result" readonly placeholder="Rewritten text will appear here..."></textarea>

      <button id="copyBtn" class="btn btn-secondary">Copy to Clipboard</button>

      <div class="footer">
        <a href="#" id="settingsLink">Settings</a>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
